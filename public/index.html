<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT Image Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.86);
        --panel-strong: #0f172a;
        --panel-soft: #1e293b;
        --ink: #f8fafc;
        --muted: #94a3b8;
        --muted-strong: #cbd5e1;
        --line: rgba(148, 163, 184, 0.22);
        --line-strong: rgba(34, 197, 94, 0.46);
        --accent: #22c55e;
        --accent-strong: #86efac;
        --danger: #fb7185;
        --warning: #facc15;
        --shadow: 0 32px 100px rgba(0, 0, 0, 0.42);
        --workspace-min-height: 720px;
        --workspace-max-height: 980px;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Fira Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 16%, rgba(34, 197, 94, 0.2), transparent 28%),
          radial-gradient(circle at 86% 8%, rgba(56, 189, 248, 0.16), transparent 26%),
          radial-gradient(circle at 78% 86%, rgba(132, 204, 22, 0.14), transparent 30%),
          linear-gradient(145deg, #020617 0%, #08111f 46%, #020617 100%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.055) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: radial-gradient(circle at center, black, transparent 78%);
      }

      body::after {
        opacity: 0.18;
        background-image: radial-gradient(rgba(248, 250, 252, 0.45) 0.7px, transparent 0.7px);
        background-size: 5px 5px;
        mix-blend-mode: screen;
      }

      main {
        position: relative;
        max-width: 1240px;
        margin: 0 auto;
        padding: 40px 20px 72px;
      }

      .eyebrow,
      .meta-label {
        font-family: "Fira Code", monospace;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      .workspace {
        display: grid;
        gap: 24px;
        height: clamp(var(--workspace-min-height), calc(100dvh - 112px), var(--workspace-max-height));
        grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
        align-items: stretch;
      }

      .panel {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 32px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(248, 250, 252, 0.11), transparent 38%);
        pointer-events: none;
      }

      .preview-panel,
      .control-panel {
        height: 100%;
      }

      .preview-panel {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 28px;
      }

      .preview-header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        min-width: max-content;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 9px 13px;
        background: rgba(2, 6, 23, 0.62);
        color: var(--muted-strong);
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 22px rgba(34, 197, 94, 0.9);
      }

      .frame {
        position: relative;
        z-index: 1;
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        isolation: isolate;
        padding: 22px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 28px;
        background:
          radial-gradient(circle at 50% 42%, rgba(34, 197, 94, 0.2), transparent 32%),
          linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.92));
      }

      .frame::before {
        content: "render stage";
        position: absolute;
        left: 20px;
        top: 18px;
        z-index: 2;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(2, 6, 23, 0.72);
        color: var(--muted-strong);
        font-family: "Fira Code", monospace;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .frame::after {
        content: "";
        position: absolute;
        inset: 12%;
        border: 1px solid rgba(34, 197, 94, 0.2);
        border-radius: 26px;
        background:
          linear-gradient(90deg, transparent 49%, rgba(34, 197, 94, 0.14) 50%, transparent 51%),
          linear-gradient(transparent 49%, rgba(34, 197, 94, 0.14) 50%, transparent 51%);
        opacity: 0.6;
        pointer-events: none;
        transition: opacity 220ms ease;
      }

      .placeholder {
        position: relative;
        z-index: 1;
        max-width: 23rem;
        margin: 0;
        padding: 0 20px;
        text-align: center;
        color: var(--muted-strong);
        line-height: 1.75;
      }

      .frame img {
        position: absolute;
        inset: 22px;
        z-index: 1;
        display: block;
        width: calc(100% - 44px);
        height: calc(100% - 44px);
        object-fit: contain;
        object-position: center center;
        border-radius: 20px;
        animation: imageReveal 520ms ease both;
      }

      .workspace[data-state="queued"] .status-dot,
      .workspace[data-state="running"] .status-dot {
        animation: pulse 1.2s ease-in-out infinite;
      }

      .workspace[data-state="failed"] .status-dot {
        background: var(--danger);
        box-shadow: 0 0 20px rgba(251, 113, 133, 0.85);
      }

      .workspace[data-state="succeeded"] .frame {
        border-color: var(--line-strong);
        box-shadow: inset 0 0 60px rgba(34, 197, 94, 0.09);
      }

      .workspace[data-state="succeeded"] .frame::after {
        opacity: 0;
      }

      .footer-note {
        position: relative;
        z-index: 1;
        margin: 0;
        color: var(--muted);
        font-family: "Fira Code", monospace;
        font-size: 0.78rem;
        line-height: 1.65;
      }

      .control-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 20px;
      }

      .form-shell {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 14px;
      }

      .field-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .character-count {
        color: var(--muted);
        font-family: "Fira Code", monospace;
        font-size: 0.78rem;
      }

      label {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--ink);
      }

      textarea {
        width: 100%;
        min-height: 150px;
        max-height: 250px;
        resize: vertical;
        scrollbar-width: thin;
        scrollbar-color: var(--accent) rgba(2, 6, 23, 0.72);
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(2, 6, 23, 0.62);
        padding: 18px 20px;
        color: var(--ink);
        outline: none;
        font: inherit;
        font-size: 0.98rem;
        line-height: 1.7;
        transition:
          border-color 180ms ease,
          box-shadow 180ms ease,
          background-color 180ms ease;
      }

      textarea::placeholder {
        color: rgba(203, 213, 225, 0.55);
      }

      textarea::-webkit-scrollbar {
        width: 10px;
      }

      textarea::-webkit-scrollbar-track {
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.72);
      }

      textarea::-webkit-scrollbar-thumb {
        border: 2px solid rgba(2, 6, 23, 0.72);
        border-radius: 999px;
        background: linear-gradient(180deg, var(--accent), #38bdf8);
      }

      textarea::-webkit-scrollbar-corner {
        background: transparent;
      }

      textarea:focus,
      button:focus-visible,
      .size-chip:has(input:focus-visible) {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.16);
      }

      textarea:disabled {
        color: rgba(248, 250, 252, 0.58);
        background: rgba(15, 23, 42, 0.5);
      }

      .prompt-examples {
        display: grid;
        gap: 8px;
      }

      .example-grid {
        display: grid;
        gap: 8px;
      }

      .prompt-example {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        padding: 10px 12px;
        background: rgba(30, 41, 59, 0.72);
        color: var(--muted-strong);
        cursor: pointer;
        font: inherit;
        font-size: 0.82rem;
        line-height: 1.45;
        text-align: left;
        transition:
          border-color 180ms ease,
          background-color 180ms ease,
          color 180ms ease;
      }

      .prompt-example:hover {
        border-color: rgba(34, 197, 94, 0.58);
        background: rgba(34, 197, 94, 0.1);
        color: var(--ink);
      }

      .size-presets {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .size-presets legend {
        padding: 0;
      }

      .size-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .size-chip {
        display: grid;
        gap: 9px;
        min-height: 104px;
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 13px;
        background: rgba(2, 6, 23, 0.5);
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background-color 180ms ease,
          transform 180ms ease;
      }

      .size-chip:hover {
        transform: translateY(-1px);
        border-color: rgba(34, 197, 94, 0.52);
      }

      .size-chip:has(input:checked) {
        border-color: var(--accent);
        background: rgba(34, 197, 94, 0.12);
      }

      .ratio-box {
        display: grid;
        place-items: center;
        min-height: 34px;
      }

      .ratio-shape {
        display: block;
        border: 1px solid rgba(134, 239, 172, 0.74);
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(34, 197, 94, 0.28), rgba(56, 189, 248, 0.12));
      }

      .ratio-square {
        width: 34px;
        height: 34px;
      }

      .ratio-portrait {
        width: 26px;
        height: 38px;
      }

      .ratio-landscape {
        width: 42px;
        height: 30px;
      }

      .size-name {
        display: block;
        color: var(--ink);
        font-weight: 700;
      }

      .size-code {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-family: "Fira Code", monospace;
        font-size: 0.68rem;
      }

      button[type="submit"] {
        appearance: none;
        border: 1px solid rgba(134, 239, 172, 0.42);
        border-radius: 999px;
        padding: 16px 22px;
        background: linear-gradient(135deg, #22c55e, #84cc16);
        color: #04130a;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        letter-spacing: 0.01em;
        transition:
          filter 180ms ease,
          box-shadow 180ms ease,
          transform 180ms ease;
      }

      button[type="submit"]:hover:not(:disabled) {
        filter: brightness(1.08);
        transform: translateY(-1px);
        box-shadow: 0 18px 42px rgba(34, 197, 94, 0.25);
      }

      button[type="submit"]:disabled {
        cursor: progress;
        filter: saturate(0.72);
        opacity: 0.82;
      }

      button[type="submit"][data-state="busy"] {
        animation: glow 1.4s ease-in-out infinite;
      }

      .metrics {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .metric,
      .progress-module,
      .note,
      .error {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(2, 6, 23, 0.48);
      }

      .metric {
        padding: 12px 14px;
      }

      .metric strong {
        display: block;
        margin-top: 7px;
        color: var(--ink);
        font-size: 0.9rem;
        line-height: 1.32;
      }

      .progress-module {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 8px;
        min-height: 74px;
        padding: 12px 16px 14px;
      }

      .progress-track {
        width: 100%;
        height: 9px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.16);
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #38bdf8);
        transition: width 300ms ease;
      }

      .progress-text,
      .note {
        color: var(--muted-strong);
        font-size: 0.8rem;
        line-height: 1.45;
      }

      .progress-text {
        margin: 0;
      }

      .note {
        position: relative;
        z-index: 1;
        margin: 0;
        padding: 10px 13px;
      }

      .error {
        position: relative;
        z-index: 1;
        margin: 0;
        padding: 13px 15px;
        border-color: rgba(251, 113, 133, 0.42);
        background: rgba(251, 113, 133, 0.1);
        color: #fecdd3;
      }

      .reveal {
        animation: rise 720ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      .delay-1 {
        animation-delay: 80ms;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(24px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.65;
          transform: scale(1);
        }

        50% {
          opacity: 1;
          transform: scale(1.35);
        }
      }

      @keyframes glow {
        0%,
        100% {
          box-shadow: 0 0 0 rgba(34, 197, 94, 0);
        }

        50% {
          box-shadow: 0 0 34px rgba(34, 197, 94, 0.36);
        }
      }

      @keyframes imageReveal {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @media (max-width: 880px) {
        main {
          padding: 24px 14px 48px;
        }

        .workspace {
          height: auto;
          grid-template-columns: 1fr;
        }

        .preview-panel,
        .control-panel {
          min-height: auto;
        }

        .preview-header {
          display: grid;
        }

        .frame {
          min-height: 420px;
        }

        .metrics {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .preview-panel,
        .control-panel {
          padding: 18px;
          border-radius: 24px;
        }

        .size-grid {
          grid-template-columns: 1fr;
        }

        .size-chip {
          min-height: 82px;
          grid-template-columns: 48px 1fr;
          align-items: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="workspace" id="workspace" data-state="idle">
        <article class="panel preview-panel reveal">
          <div class="preview-header">
            <p class="eyebrow">GPT Image 2 / 暗色图像工作台</p>
            <span class="status-pill">
              <span class="status-dot" aria-hidden="true"></span>
              <span class="meta-label" id="stage-state">空闲</span>
            </span>
          </div>
          <div class="frame">
            <p class="placeholder" id="placeholder-text">
              生成完成的画面会出现在这里。等待期间，你可以在右侧查看队列和预计耗时，舞台会保持当前会话状态。
            </p>
            <img id="result-image" src="" alt="" hidden loading="lazy" />
          </div>
          <p class="footer-note">
            会话隔离队列 · 单任务生成 · 仅展示真实唯一尺寸
          </p>
        </article>

        <aside class="panel control-panel reveal delay-1">
          <form class="form-shell" id="prompt-form">
            <div class="field-head">
              <label for="prompt-input">图像提示词</label>
              <span class="character-count" id="character-count">0 字</span>
            </div>
            <textarea
              id="prompt-input"
              name="prompt"
              placeholder="电影级真实摄影：雨后东京街角的一家深夜拉面店，玻璃窗上有细密水珠和霓虹倒影，一位穿深色风衣的年轻女性坐在靠窗位置，手边是一碗热气升腾的拉面，环境光来自红蓝霓虹与暖色店灯，浅景深，35mm 镜头，真实皮肤质感，胶片颗粒，高动态范围，杂志封面级构图"
            ></textarea>
            <div class="prompt-examples">
              <span class="meta-label">预置提示词</span>
              <div class="example-grid">
                <button
                  class="prompt-example"
                  type="button"
                  data-prompt="电影级真实摄影：雨后东京街角的一家深夜拉面店，玻璃窗上有细密水珠和霓虹倒影，一位穿深色风衣的年轻女性坐在靠窗位置，手边是一碗热气升腾的拉面，环境光来自红蓝霓虹与暖色店灯，浅景深，35mm 镜头，真实皮肤质感，胶片颗粒，高动态范围，杂志封面级构图"
                >
                  真实摄影风格 · 雨夜拉面店、霓虹反光、35mm 胶片质感
                </button>
                <button
                  class="prompt-example"
                  type="button"
                  data-prompt="精致二次元插画：樱花季的未来学院天台，银白短发少女穿着改良水手服与透明机能外套，身后是漂浮的全息城市地图和黄昏云层，微风吹起发丝与丝带，清澈大眼，高级动画电影光影，细腻线稿，柔和渐变上色，丰富背景细节，干净构图，超高完成度"
                >
                  二次元插画风格 · 未来学院天台、樱花、动画电影光影
                </button>
              </div>
            </div>
            <fieldset class="size-presets">
              <legend class="meta-label">真实渲染尺寸</legend>
              <div class="size-grid">
                <label class="size-chip">
                  <input class="visually-hidden" type="radio" name="size-preset" value="square" />
                  <span class="ratio-box" aria-hidden="true"><span class="ratio-shape ratio-square"></span></span>
                  <span><span class="size-name">方形</span><span class="size-code">1024 × 1024</span></span>
                </label>
                <label class="size-chip">
                  <input class="visually-hidden" type="radio" name="size-preset" value="portrait" checked />
                  <span class="ratio-box" aria-hidden="true"><span class="ratio-shape ratio-portrait"></span></span>
                  <span><span class="size-name">竖图</span><span class="size-code">1024 × 1536</span></span>
                </label>
                <label class="size-chip">
                  <input class="visually-hidden" type="radio" name="size-preset" value="landscape" />
                  <span class="ratio-box" aria-hidden="true"><span class="ratio-shape ratio-landscape"></span></span>
                  <span><span class="size-name">横图</span><span class="size-code">1536 × 1024</span></span>
                </label>
              </div>
            </fieldset>
            <button id="submit-button" type="submit" data-state="ready">生成图像</button>
          </form>
          <div class="metrics" aria-live="polite">
            <div class="metric">
              <span class="meta-label">状态</span>
              <strong id="status-text">等待输入第一条提示词。</strong>
            </div>
            <div class="metric">
              <span class="meta-label">队列总数</span>
              <strong id="queue-value">队列中共 0 个任务</strong>
            </div>
          </div>
          <div class="progress-module" id="progress-wrap" hidden>
            <span class="meta-label">预计等待</span>
            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text"></p>
          </div>
          <p class="note">
            任务提交后编辑器会暂时锁定，确保当前浏览器窗口只追踪一个正在生成的画面。
          </p>
          <p class="note">
            “故事”和“宽屏”是重复映射尺寸，前端已隐藏，仅保留真实唯一的三种尺寸。
          </p>
          <p class="error" id="error-text" hidden></p>
        </aside>
      </section>
    </main>

    <script src="/app.js"></script>
    <script>
      window.ImageDemoApp.start();
    </script>
  </body>
</html>
